spring:
  main:
    banner-mode: "off"
    web-application-type: none
  datasource:
    driver-class-name: tech.ydb.jdbc.YdbDriver
    hikari:
      maximum-pool-size: ${SLO_HIKARI_POOL_SIZE:130}
      minimum-idle: 16
      connection-timeout: 10000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: tech.ydb.hibernate.dialect.YdbDialect

logging:
  level:
    root: info
    tech.ydb: info
    tech.ydb.slo: info
    org.springframework: warn
    org.hibernate: warn
